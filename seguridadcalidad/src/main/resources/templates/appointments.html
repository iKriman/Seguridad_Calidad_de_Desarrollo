<!DOCTYPE HTML>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Lista de Citas</title>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
    <link rel="stylesheet" type="text/css" href="/style.css" />
</head>
<body>
<div class="page-container">
    <h1>Citas agendadas</h1>
    <div class="actions">
        <a class="btn btn-primary" th:href="@{/appointments/new}">Agendar cita</a>
        <a class="btn btn-secondary" th:href="@{/home}">Volver a inicio</a>
    </div>
    <div class="table-wrapper">
        <table class="patients-table">
            <thead>
            <tr>
                <th>ID</th>
                <th>Paciente</th>
                <th>Fecha</th>
                <th>Hora</th>
                <th>Motivo</th>
                <th>Veterinario</th>
            </tr>
            </thead>
            <tbody id="appointmentsTableBody">
            <tr><td colspan="6">Cargando datos...</td></tr>
            </tbody>
        </table>
    </div>
</div>
<script>
    async function loadAppointments() {
        const token = localStorage.getItem('jwtToken');
        if (!token) {
            window.location.href = '/login';
            return;
        }

        console.log('-> Frontend: loadAppointments called with token=', token); // Debug log

        try {
            console.log('-> Frontend: GET /api/appointments');
            const response = await fetch('/api/appointments', {
                headers: { 'Authorization': 'Bearer ' + token }
            });
            console.log('<- Frontend: GET /api/appointments status=' + response.status);

            if (response.status === 401 || response.status === 403) {
                localStorage.removeItem('jwtToken');
                window.location.href = '/login';
                return;
            }

            const appointments = await response.json();
            console.log('<- Frontend: GET /api/appointments body=', appointments);
            const tbody = document.getElementById('appointmentsTableBody');
            tbody.innerHTML = '';

            if (!appointments.length) {
                tbody.innerHTML = '<tr><td colspan="6">No hay citas agendadas.</td></tr>';
                return;
            }

            appointments.forEach(appointment => {
                const row = document.createElement('tr');
                row.innerHTML = `<td>${appointment.id}</td><td>${appointment.patientId}</td><td>${appointment.date}</td><td>${appointment.time}</td><td>${appointment.reason}</td><td>${appointment.veterinarian}</td>`;
                tbody.appendChild(row);
            });
        } catch (error) {
            console.error('Frontend: GET /api/appointments error=', error.message, error.stack);
            document.getElementById('appointmentsTableBody').innerHTML = '<tr><td colspan="6">Error cargando citas.</td></tr>';
        }
    }

    loadAppointments();
</script>
</body>
</html>
